<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Star Brightness Poll</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080c14; --surface: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.1);
    --blue: #4f8ef7; --green: #34d399; --text: #e2e8f0; --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Crimson Pro', Georgia, serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 32px 16px 60px; position: relative; overflow-x: hidden; }
  #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star { position: absolute; border-radius: 50%; background: white; animation: twinkle var(--dur) ease-in-out infinite var(--delay); }
  @keyframes twinkle { 0%,100%{opacity:.15} 50%{opacity:var(--peak)} }
  .wrap { position: relative; z-index: 1; width: 100%; max-width: 560px; }
  header { text-align: center; margin-bottom: 36px; animation: fadeUp .7s ease both; }
  .icon { font-size: 48px; margin-bottom: 12px; display: block; }
  h1 { font-family: 'Space Mono', monospace; font-size: clamp(12px,3vw,15px); letter-spacing: 4px; color: var(--blue); text-transform: uppercase; margin-bottom: 10px; }
  .divider { width: 50px; height: 2px; background: linear-gradient(90deg,var(--blue),#a78bfa); margin: 12px auto 20px; border-radius: 2px; }
  .question { font-size: clamp(20px,4vw,24px); line-height: 1.5; font-style: italic; color: #f1f5f9; }
  .hint { margin-top: 10px; font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); }
  .tabs { display: flex; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 5px; margin-bottom: 24px; animation: fadeUp .7s .1s ease both; }
  .tab { flex: 1; padding: 10px; border: none; border-radius: 9px; background: transparent; color: var(--muted); font-family: 'Crimson Pro', serif; font-size: 16px; cursor: pointer; transition: all .2s; }
  .tab.active { background: rgba(79,142,247,.25); color: #93c5fd; }
  .opt { display: flex; align-items: center; gap: 14px; width: 100%; background: var(--surface); border: 2px solid var(--border); border-radius: 14px; padding: 16px 20px; margin-bottom: 12px; color: var(--text); font-family: 'Crimson Pro', serif; font-size: 18px; cursor: pointer; text-align: left; transition: all .2s; }
  .opt:hover { border-color: rgba(255,255,255,.3); background: rgba(255,255,255,.07); transform: translateX(4px); }
  .opt.selected { border-color: var(--blue); background: rgba(79,142,247,.12); }
  .opt.disabled { opacity: .4; cursor: default; transform: none !important; }
  .radio { width: 22px; height: 22px; min-width: 22px; border-radius: 50%; border: 2px solid rgba(255,255,255,.3); transition: all .2s; display: flex; align-items: center; justify-content: center; }
  .opt.selected .radio { border-color: var(--blue); background: var(--blue); }
  .radio-dot { width: 8px; height: 8px; border-radius: 50%; background: white; display: none; }
  .opt.selected .radio-dot { display: block; }
  .submit-btn { width: 100%; margin-top: 8px; padding: 16px; background: linear-gradient(135deg,#3b82f6,#7c3aed); border: none; border-radius: 14px; color: white; font-family: 'Crimson Pro', serif; font-size: 20px; cursor: pointer; transition: all .2s; }
  .submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(79,142,247,.35); }
  .submit-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .notice { border-radius: 12px; padding: 12px 16px; font-size: 15px; text-align: center; margin-bottom: 16px; }
  .notice.success { background: rgba(52,211,153,.1); border: 1px solid rgba(52,211,153,.35); color: #6ee7b7; }
  .notice.error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.35); color: #fca5a5; }
  .result-count { text-align:center; color: var(--muted); font-family:'Space Mono',monospace; font-size:13px; margin-bottom:20px; }
  .result-row { margin-bottom: 18px; }
  .result-label { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 7px; font-size: 16px; gap: 12px; }
  .label-text { flex: 1; }
  .pct { font-family:'Space Mono',monospace; font-size:13px; white-space:nowrap; }
  .bar-track { height: 10px; background: rgba(255,255,255,.07); border-radius: 6px; overflow:hidden; }
  .bar-fill { height: 100%; border-radius: 6px; transition: width 1s cubic-bezier(.4,0,.2,1); }
  .correct-label { color: var(--green); }
  .reset-btn { margin-top: 20px; background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; color: var(--muted); font-size: 13px; font-family: 'Space Mono', monospace; cursor: pointer; transition: all .2s; }
  .reset-btn:hover { border-color: rgba(255,255,255,.25); color: #94a3b8; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #vote-panel, #results-panel { display: none; }
  #vote-panel.active, #results-panel.active { display: block; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div id="stars"></div>
<div class="wrap">
  <header>
    <span class="icon">⭐</span>
    <h1>Astronomy Poll</h1>
    <div class="divider"></div>
    <p class="question">If Star A is 5 magnitudes brighter than Star B, how much brighter is it?</p>
    <p class="hint">Hint: m₁ − m₂ = −2.5 log₁₀(F₁/F₂)</p>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="showTab('vote')">Vote</button>
    <button class="tab" onclick="showTab('results')">Results</button>
  </div>

  <div id="vote-panel" class="active">
    <div id="vote-notice" style="display:none"></div>
    <div class="options">
      <button class="opt" onclick="selectOpt('a')" id="opt-a"><span class="radio"><span class="radio-dot"></span></span>Star A is twice as bright as Star B.</button>
      <button class="opt" onclick="selectOpt('b')" id="opt-b"><span class="radio"><span class="radio-dot"></span></span>Star B is twice as bright as Star A.</button>
      <button class="opt" onclick="selectOpt('c')" id="opt-c"><span class="radio"><span class="radio-dot"></span></span>Star A is 100 times as bright as Star B.</button>
      <button class="opt" onclick="selectOpt('d')" id="opt-d"><span class="radio"><span class="radio-dot"></span></span>Star B is 100 times as bright as Star A.</button>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitVote()" disabled>Submit Answer</button>
  </div>

  <div id="results-panel">
    <div class="result-count" id="result-count">Loading...</div>
    <div id="result-bars"></div>
    <button class="reset-btn" onclick="resetPoll()">🔄 Reset my vote (re-vote)</button>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwawO0g2GKeGh5C9CqEs_eFSdELAMXKcKufOBdZbS7JyZuayXfBkPB3B3xBojzwADFG/exec';
const OPTIONS = ['a','b','c','d'];
const CORRECT = 'c';
const COLORS = {a:'#4f8ef7',b:'#a78bfa',c:'#34d399',d:'#f59e0b'};
const LABELS = {
  a:'Star A is twice as bright as Star B.',
  b:'Star B is twice as bright as Star A.',
  c:'Star A is 100 times as bright as Star B.',
  d:'Star B is 100 times as bright as Star A.'
};
let selected = null, hasVoted = false;

// Starfield
const starsEl = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
  const s = document.createElement('div'); s.className = 'star';
  const sz = Math.random()<.15?3:Math.random()<.4?2:1;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:-${Math.random()*5}s;--peak:${.4+Math.random()*.6}`;
  starsEl.appendChild(s);
}

window.onload = function() {
  const myVote = localStorage.getItem('astro_poll_my_vote');
  if (myVote) { selected = myVote; hasVoted = true; showVotedState(myVote); }
  fetchResults();
  setInterval(fetchResults, 5000);
};

function showVotedState(vote) {
  const n = document.getElementById('vote-notice');
  n.className = 'notice success'; n.textContent = '✓ Vote submitted! See Results tab.'; n.style.display = 'block';
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('submit-btn').textContent = 'Submitted ✓';
  OPTIONS.forEach(id => {
    const b = document.getElementById('opt-'+id); b.classList.add('disabled');
    if (id !== vote) b.style.opacity = '0.3'; else b.classList.add('selected');
  });
}

function selectOpt(id) {
  if (hasVoted) return;
  selected = id;
  OPTIONS.forEach(o => document.getElementById('opt-'+o).classList.toggle('selected', o===id));
  document.getElementById('submit-btn').disabled = false;
}

async function submitVote() {
  if (!selected || hasVoted) return;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Submitting...';
  try {
    await fetch(API, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify({vote:selected}) });
    localStorage.setItem('astro_poll_my_vote', selected);
    hasVoted = true; showVotedState(selected);
    setTimeout(() => { fetchResults(); showTab('results'); }, 1000);
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Submit Answer';
    const n = document.getElementById('vote-notice');
    n.className = 'notice error'; n.textContent = '⚠ Could not submit. Check your connection.'; n.style.display = 'block';
  }
}

async function fetchResults() {
  try {
    const res = await fetch(API + '?nocache=' + Date.now());
    const votes = await res.json();
    renderResults(votes);
  } catch(e) { document.getElementById('result-count').textContent = 'Could not load results.'; }
}

function renderResults(votes) {
  const total = Object.values(votes).reduce((a,b)=>a+b,0);
  document.getElementById('result-count').textContent = total===0?'No responses yet':`${total} response${total!==1?'s':''} · updates every 5s`;
  const bars = document.getElementById('result-bars'); bars.innerHTML = '';
  OPTIONS.forEach(id => {
    const pct = total>0?Math.round((votes[id]||0)/total*100):0;
    const isCorrect = id===CORRECT;
    const row = document.createElement('div'); row.className = 'result-row';
    row.innerHTML = `<div class="result-label"><span class="label-text ${isCorrect?'correct-label':''}">${isCorrect?'✓ ':''}${LABELS[id]}</span><span class="pct" style="color:${COLORS[id]}">${pct}% <span style="color:#475569">(${votes[id]||0})</span></span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${isCorrect?'linear-gradient(90deg,#10b981,#6ee7b7)':`linear-gradient(90deg,${COLORS[id]}88,${COLORS[id]})`}"></div></div>`;
    bars.appendChild(row);
  });
}

function resetPoll() {
  localStorage.removeItem('astro_poll_my_vote');
  location.reload();
}

function showTab(tab) {
  document.getElementById('vote-panel').classList.toggle('active', tab==='vote');
  document.getElementById('results-panel').classList.toggle('active', tab==='results');
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='vote')||(i===1&&tab==='results')));
  if (tab==='results') fetchResults();
}
</script>
</body>
</html>
